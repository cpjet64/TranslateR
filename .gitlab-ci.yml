stages:
  - validate
  - test
  - package
  - release
  - mirror

variables:
  CARGO_TERM_COLOR: always
  PACKAGE_NAME: translater

.main_only:
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

.main_or_tag:
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_TAG'

.tag_only:
  rules:
    - if: '$CI_COMMIT_TAG'

.tag_with_github_release:
  rules:
    - if: '$CI_COMMIT_TAG && $GITHUB_RELEASE_TOKEN'

.main_with_github_mirror:
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $GITHUB_MIRROR_URL && $GITHUB_MIRROR_SSH_KEY'
    - if: '$CI_COMMIT_TAG && $GITHUB_MIRROR_URL && $GITHUB_MIRROR_SSH_KEY'

.linux_cache:
  cache:
    key:
      files:
        - Cargo.lock
      prefix: "$CI_JOB_NAME"
    paths:
      - .cargo/registry
      - .cargo/git
      - target

format:rust:
  stage: validate
  extends:
    - .main_or_tag
    - .linux_cache
  tags:
    - linux
    - ubuntu
    - ubuntu24
    - unprotected
    - linux-unprotected
    - ubuntu-unprotected
    - ubuntu24-unprotected
  before_script:
    - sh scripts/ci/setup-linux.sh
  script:
    - unset RUSTC_WRAPPER
    - cargo fmt --all -- --check

test:ubuntu:
  stage: test
  extends:
    - .main_or_tag
    - .linux_cache
  tags:
    - linux
    - ubuntu
    - ubuntu24
    - unprotected
    - linux-unprotected
    - ubuntu-unprotected
    - ubuntu24-unprotected
  before_script:
    - sh scripts/ci/setup-linux.sh
  script:
    - unset RUSTC_WRAPPER
    - cargo test --locked

test:debian:
  stage: test
  extends:
    - .main_or_tag
    - .linux_cache
  tags:
    - linux
    - debian
    - debian12
    - unprotected
    - linux-unprotected
    - debian-unprotected
    - debian12-unprotected
  before_script:
    - sh scripts/ci/setup-linux.sh
  script:
    - unset RUSTC_WRAPPER
    - cargo test --locked

test:windows:
  stage: test
  extends: .main_or_tag
  tags:
    - windows
    - win11
    - unprotected
    - windows-unprotected
    - win11-unprotected
  script:
    - $env:RUSTC_WRAPPER=""
    - cargo test --locked

test:macos:
  stage: test
  extends: .main_or_tag
  tags:
    - macos
    - sequoia
    - macos-sequoia-intel
    - unprotected
    - macos-unprotected
    - sequoia-unprotected
    - macos-sequoia-intel-unprotected
  script:
    - unset RUSTC_WRAPPER
    - cargo test --locked

package:ubuntu:
  stage: package
  extends:
    - .main_or_tag
    - .linux_cache
  tags:
    - linux
    - ubuntu
    - ubuntu24
    - unprotected
    - linux-unprotected
    - ubuntu-unprotected
    - ubuntu24-unprotected
  before_script:
    - sh scripts/ci/setup-linux.sh
  script:
    - unset RUSTC_WRAPPER
    - sh scripts/ci/package-unix.sh translater-ubuntu-x86_64
    - |
      if [ -n "${CI_COMMIT_TAG:-}" ]; then
        package_file="target/artifacts/translater-ubuntu-x86_64.tar.gz"
        upload_url="$CI_API_V4_URL/projects/$CI_PROJECT_ID/packages/generic/$PACKAGE_NAME/$CI_COMMIT_TAG/translater-ubuntu-x86_64.tar.gz"
        curl --fail --header "JOB-TOKEN: $CI_JOB_TOKEN" --upload-file "$package_file" "$upload_url"
      fi
  artifacts:
    name: translater-ubuntu-x86_64
    expire_in: 14 days
    paths:
      - target/artifacts/translater-ubuntu-x86_64.tar.gz

package:debian:
  stage: package
  extends:
    - .main_or_tag
    - .linux_cache
  tags:
    - linux
    - debian
    - debian12
    - unprotected
    - linux-unprotected
    - debian-unprotected
    - debian12-unprotected
  before_script:
    - sh scripts/ci/setup-linux.sh
  script:
    - unset RUSTC_WRAPPER
    - sh scripts/ci/package-unix.sh translater-debian-x86_64
    - |
      if [ -n "${CI_COMMIT_TAG:-}" ]; then
        package_file="target/artifacts/translater-debian-x86_64.tar.gz"
        upload_url="$CI_API_V4_URL/projects/$CI_PROJECT_ID/packages/generic/$PACKAGE_NAME/$CI_COMMIT_TAG/translater-debian-x86_64.tar.gz"
        curl --fail --header "JOB-TOKEN: $CI_JOB_TOKEN" --upload-file "$package_file" "$upload_url"
      fi
  artifacts:
    name: translater-debian-x86_64
    expire_in: 14 days
    paths:
      - target/artifacts/translater-debian-x86_64.tar.gz

package:windows:
  stage: package
  extends: .main_or_tag
  tags:
    - windows
    - win11
    - unprotected
    - windows-unprotected
    - win11-unprotected
  script:
    - $env:RUSTC_WRAPPER=""
    - powershell -NoProfile -ExecutionPolicy Bypass -File scripts/ci/package-windows.ps1 -ArtifactName translater-windows-x86_64
    - $packagePath = Join-Path $env:CI_PROJECT_DIR "ci-artifacts\translater-windows-x86_64.zip"
    - $packageVersion = if ($env:CI_COMMIT_TAG) { $env:CI_COMMIT_TAG } else { $env:CI_COMMIT_SHORT_SHA }
    - $uploadUrl = "$env:CI_API_V4_URL/projects/$env:CI_PROJECT_ID/packages/generic/$env:PACKAGE_NAME/$packageVersion/translater-windows-x86_64.zip"
    - Invoke-WebRequest -UseBasicParsing -Method Put -Headers @{ "JOB-TOKEN" = $env:CI_JOB_TOKEN } -InFile $packagePath -Uri $uploadUrl

package:macos:
  stage: package
  extends: .main_or_tag
  tags:
    - macos
    - sequoia
    - macos-sequoia-intel
    - unprotected
    - macos-unprotected
    - sequoia-unprotected
    - macos-sequoia-intel-unprotected
  script:
    - unset RUSTC_WRAPPER
    - sh scripts/ci/package-unix.sh translater-macos-x86_64
    - |
      if [ -n "${CI_COMMIT_TAG:-}" ]; then
        package_file="target/artifacts/translater-macos-x86_64.tar.gz"
        upload_url="$CI_API_V4_URL/projects/$CI_PROJECT_ID/packages/generic/$PACKAGE_NAME/$CI_COMMIT_TAG/translater-macos-x86_64.tar.gz"
        curl --fail --header "JOB-TOKEN: $CI_JOB_TOKEN" --upload-file "$package_file" "$upload_url"
      fi
  artifacts:
    name: translater-macos-x86_64
    expire_in: 14 days
    paths:
      - target/artifacts/translater-macos-x86_64.tar.gz

release:gitlab:
  stage: release
  extends: .tag_only
  tags:
    - linux
    - ubuntu
    - ubuntu24
    - protected
    - linux-protected
    - ubuntu-protected
    - ubuntu24-protected
  needs:
    - package:ubuntu
    - package:debian
    - package:windows
    - package:macos
  script:
    - test -n "$CI_COMMIT_TAG"
    - |
      base="$CI_API_V4_URL/projects/$CI_PROJECT_ID/packages/generic/$PACKAGE_NAME/$CI_COMMIT_TAG"
      curl --fail --request POST \
        --header "JOB-TOKEN: $CI_JOB_TOKEN" \
        --data-urlencode "name=TranslateR $CI_COMMIT_TAG" \
        --data-urlencode "tag_name=$CI_COMMIT_TAG" \
        --data-urlencode "description=Portable TranslateR release $CI_COMMIT_TAG." \
        --data-urlencode "assets[links][][name]=Windows x86_64 zip" \
        --data-urlencode "assets[links][][url]=$base/translater-windows-x86_64.zip" \
        --data-urlencode "assets[links][][name]=Ubuntu x86_64 tar.gz" \
        --data-urlencode "assets[links][][url]=$base/translater-ubuntu-x86_64.tar.gz" \
        --data-urlencode "assets[links][][name]=Debian x86_64 tar.gz" \
        --data-urlencode "assets[links][][url]=$base/translater-debian-x86_64.tar.gz" \
        --data-urlencode "assets[links][][name]=macOS x86_64 tar.gz" \
        --data-urlencode "assets[links][][url]=$base/translater-macos-x86_64.tar.gz" \
        "$CI_API_V4_URL/projects/$CI_PROJECT_ID/releases"

release:github:
  stage: release
  extends: .tag_with_github_release
  tags:
    - linux
    - ubuntu
    - ubuntu24
    - protected
    - linux-protected
    - ubuntu-protected
    - ubuntu24-protected
  needs:
    - package:ubuntu
    - package:debian
    - package:windows
    - package:macos
  script:
    - python3 scripts/ci/github-release.py

mirror:github:
  stage: mirror
  extends: .main_with_github_mirror
  tags:
    - linux
    - ubuntu
    - ubuntu24
    - protected
    - linux-protected
    - ubuntu-protected
    - ubuntu24-protected
  needs: []
  before_script:
    - test -n "$GITHUB_MIRROR_URL"
    - test -n "$GITHUB_MIRROR_SSH_KEY"
    - mkdir -p ~/.ssh
    - cp "$GITHUB_MIRROR_SSH_KEY" ~/.ssh/github_mirror
    - chmod 600 ~/.ssh/github_mirror
    - ssh-keyscan github.com >> ~/.ssh/known_hosts
    - git config core.sshCommand "ssh -i ~/.ssh/github_mirror -o IdentitiesOnly=yes"
  script:
    - git remote remove github-mirror 2>/dev/null || true
    - git remote add github-mirror "$GITHUB_MIRROR_URL"
    - git push github-mirror "HEAD:refs/heads/main"
    - git push github-mirror --tags
