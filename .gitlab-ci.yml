stages:
  - validate
  - test
  - release_prepare
  - package
  - gitlab_release
  - mirror
  - github_release

workflow:
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - when: never

variables:
  CARGO_TERM_COLOR: always
  PACKAGE_NAME: translater

.main_only:
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

.main_or_tag:
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_TAG'

.tag_only:
  rules:
    - if: '$CI_COMMIT_TAG'

.tag_with_github_release:
  rules:
    - if: '$CI_COMMIT_TAG && $GITHUB_RELEASE_TOKEN'

.main_or_tag_with_github_release:
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $GITHUB_RELEASE_TOKEN'
    - if: '$CI_COMMIT_TAG && $GITHUB_RELEASE_TOKEN'

.main_with_github_mirror:
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $GITHUB_MIRROR_URL && $GITHUB_MIRROR_SSH_KEY'

.linux_cache:
  cache:
    key:
      files:
        - Cargo.lock
      prefix: "$CI_JOB_NAME"
    paths:
      - .cargo/registry
      - .cargo/git
      - target

format:rust:
  stage: validate
  extends:
    - .main_or_tag
    - .linux_cache
  tags:
    - linux
    - ubuntu
    - ubuntu24
    - unprotected
    - linux-unprotected
    - ubuntu-unprotected
    - ubuntu24-unprotected
  before_script:
    - INSTALL_COVERAGE_TOOLS=1 sh scripts/ci/setup-linux.sh
  script:
    - unset RUSTC_WRAPPER
    - cargo fmt --all -- --check

i18n:check:
  stage: validate
  extends: .main_or_tag
  tags:
    - linux
    - ubuntu
    - ubuntu24
    - unprotected
    - linux-unprotected
    - ubuntu-unprotected
    - ubuntu24-unprotected
  script:
    - python3 scripts/i18n/generate-translater-po.py --check

test:ubuntu:
  stage: test
  extends:
    - .main_or_tag
    - .linux_cache
  tags:
    - linux
    - ubuntu
    - ubuntu24
    - unprotected
    - linux-unprotected
    - ubuntu-unprotected
    - ubuntu24-unprotected
  before_script:
    - sh scripts/ci/setup-linux.sh
  script:
    - unset RUSTC_WRAPPER
    - cargo test --locked

coverage:ubuntu:
  stage: test
  extends:
    - .main_or_tag
    - .linux_cache
  tags:
    - linux
    - ubuntu
    - ubuntu24
    - unprotected
    - linux-unprotected
    - ubuntu-unprotected
    - ubuntu24-unprotected
  before_script:
    - sh scripts/ci/setup-linux.sh
  script:
    - unset RUSTC_WRAPPER
    - sh scripts/ci/coverage.sh

test:debian:
  stage: test
  extends:
    - .main_or_tag
    - .linux_cache
  tags:
    - linux
    - debian
    - debian12
    - unprotected
    - linux-unprotected
    - debian-unprotected
    - debian12-unprotected
  before_script:
    - sh scripts/ci/setup-linux.sh
  script:
    - unset RUSTC_WRAPPER
    - cargo test --locked

test:windows:
  stage: test
  extends: .main_or_tag
  tags:
    - windows
    - win11
    - unprotected
    - windows-unprotected
    - win11-unprotected
  script:
    - $env:RUSTC_WRAPPER=""
    - cargo test --locked

test:macos:
  stage: test
  extends: .main_or_tag
  tags:
    - macos
    - sequoia
    - macos-sequoia-intel
    - unprotected
    - macos-unprotected
    - sequoia-unprotected
    - macos-sequoia-intel-unprotected
  script:
    - unset RUSTC_WRAPPER
    - cargo test --locked

release:prepare:
  stage: release_prepare
  extends: .main_or_tag
  tags:
    - linux
    - ubuntu
    - ubuntu24
    - unprotected
    - linux-unprotected
    - ubuntu-unprotected
    - ubuntu24-unprotected
  script:
    - python3 scripts/ci/prepare-release.py
    - python3 scripts/i18n/generate-translater-po.py --out-dir release-i18n --release-version "$RELEASE_TAG"
  artifacts:
    expire_in: 14 days
    reports:
      dotenv: release.env
    paths:
      - Cargo.toml
      - Cargo.lock
      - release.env
      - release-notes.md
      - release-i18n/

package:ubuntu:
  stage: package
  extends:
    - .main_or_tag
    - .linux_cache
  tags:
    - linux
    - ubuntu
    - ubuntu24
    - unprotected
    - linux-unprotected
    - ubuntu-unprotected
    - ubuntu24-unprotected
  before_script:
    - sh scripts/ci/setup-linux.sh
  needs:
    - job: release:prepare
      artifacts: true
  script:
    - unset RUSTC_WRAPPER
    - sh scripts/ci/package-unix.sh translater-ubuntu-x86_64
    - |
      package_file="target/artifacts/translater-ubuntu-x86_64.tar.gz"
      upload_url="$CI_API_V4_URL/projects/$CI_PROJECT_ID/packages/generic/$PACKAGE_NAME/$RELEASE_TAG/translater-ubuntu-x86_64.tar.gz"
      if [ "$RELEASE_SKIP" != "true" ]; then
        curl --fail --header "JOB-TOKEN: $CI_JOB_TOKEN" --upload-file "$package_file" "$upload_url"
      fi
  artifacts:
    name: translater-ubuntu-x86_64
    expire_in: 14 days
    paths:
      - target/artifacts/translater-ubuntu-x86_64.tar.gz

package:debian:
  stage: package
  extends:
    - .main_or_tag
    - .linux_cache
  tags:
    - linux
    - debian
    - debian12
    - unprotected
    - linux-unprotected
    - debian-unprotected
    - debian12-unprotected
  before_script:
    - sh scripts/ci/setup-linux.sh
  needs:
    - job: release:prepare
      artifacts: true
  script:
    - unset RUSTC_WRAPPER
    - sh scripts/ci/package-unix.sh translater-debian-x86_64
    - |
      package_file="target/artifacts/translater-debian-x86_64.tar.gz"
      upload_url="$CI_API_V4_URL/projects/$CI_PROJECT_ID/packages/generic/$PACKAGE_NAME/$RELEASE_TAG/translater-debian-x86_64.tar.gz"
      if [ "$RELEASE_SKIP" != "true" ]; then
        curl --fail --header "JOB-TOKEN: $CI_JOB_TOKEN" --upload-file "$package_file" "$upload_url"
      fi
  artifacts:
    name: translater-debian-x86_64
    expire_in: 14 days
    paths:
      - target/artifacts/translater-debian-x86_64.tar.gz

package:windows:
  stage: package
  extends: .main_or_tag
  tags:
    - windows
    - win11
    - protected
    - windows-protected
    - win11-protected
  resource_group: windows-protected-workspace
  needs:
    - job: release:prepare
      artifacts: true
  script:
    - $env:RUSTC_WRAPPER=""
    - powershell -NoProfile -ExecutionPolicy Bypass -File scripts/ci/package-windows.ps1 -ArtifactName translater-windows-x86_64
    - $packagePath = Join-Path $env:CI_PROJECT_DIR "ci-artifacts\translater-windows-x86_64.zip"
    - $packageVersion = $env:RELEASE_TAG
    - $uploadUrl = "$env:CI_API_V4_URL/projects/$env:CI_PROJECT_ID/packages/generic/$env:PACKAGE_NAME/$packageVersion/translater-windows-x86_64.zip"
    - if ($env:RELEASE_SKIP -ne "true") { Invoke-WebRequest -UseBasicParsing -Method Put -Headers @{ "JOB-TOKEN" = $env:CI_JOB_TOKEN } -InFile $packagePath -Uri $uploadUrl }
  artifacts:
    name: translater-windows-x86_64
    expire_in: 14 days
    paths:
      - ci-artifacts/translater-windows-x86_64.zip

package:macos:
  stage: package
  extends: .main_or_tag
  tags:
    - macos
    - sequoia
    - macos-sequoia-intel
    - unprotected
    - macos-unprotected
    - sequoia-unprotected
    - macos-sequoia-intel-unprotected
  needs:
    - job: release:prepare
      artifacts: true
  script:
    - unset RUSTC_WRAPPER
    - sh scripts/ci/package-unix.sh translater-macos-x86_64
    - |
      package_file="target/artifacts/translater-macos-x86_64.tar.gz"
      upload_url="$CI_API_V4_URL/projects/$CI_PROJECT_ID/packages/generic/$PACKAGE_NAME/$RELEASE_TAG/translater-macos-x86_64.tar.gz"
      if [ "$RELEASE_SKIP" != "true" ]; then
        curl --fail --header "JOB-TOKEN: $CI_JOB_TOKEN" --upload-file "$package_file" "$upload_url"
      fi
  artifacts:
    name: translater-macos-x86_64
    expire_in: 14 days
    paths:
      - target/artifacts/translater-macos-x86_64.tar.gz

package:i18n:
  stage: package
  extends: .main_or_tag
  tags:
    - linux
    - ubuntu
    - ubuntu24
    - unprotected
    - linux-unprotected
    - ubuntu-unprotected
    - ubuntu24-unprotected
  needs:
    - job: release:prepare
      artifacts: true
  script:
    - python3 scripts/ci/package-i18n.py
    - |
      package_file="target/artifacts/translater-i18n.zip"
      upload_url="$CI_API_V4_URL/projects/$CI_PROJECT_ID/packages/generic/$PACKAGE_NAME/$RELEASE_TAG/translater-i18n.zip"
      if [ "$RELEASE_SKIP" != "true" ]; then
        curl --fail --header "JOB-TOKEN: $CI_JOB_TOKEN" --upload-file "$package_file" "$upload_url"
      fi
  artifacts:
    name: translater-i18n
    expire_in: 14 days
    paths:
      - target/artifacts/translater-i18n.zip

release:gitlab:
  stage: gitlab_release
  extends: .main_or_tag
  tags:
    - linux
    - ubuntu
    - ubuntu24
    - protected
    - linux-protected
    - ubuntu-protected
    - ubuntu24-protected
  needs:
    - job: release:prepare
      artifacts: true
    - job: package:ubuntu
    - job: package:debian
    - job: package:windows
    - job: package:macos
    - job: package:i18n
  script:
    - python3 scripts/ci/gitlab-release.py

release:github:
  stage: github_release
  extends: .main_or_tag_with_github_release
  tags:
    - linux
    - ubuntu
    - ubuntu24
    - protected
    - linux-protected
    - ubuntu-protected
    - ubuntu24-protected
  needs:
    - job: release:prepare
      artifacts: true
    - job: package:ubuntu
    - job: package:debian
    - job: package:windows
    - job: package:macos
    - job: package:i18n
    - job: mirror:github
      optional: true
  script:
    - python3 scripts/ci/github-release.py

mirror:github:
  stage: mirror
  extends: .main_with_github_mirror
  tags:
    - linux
    - ubuntu
    - ubuntu24
    - protected
    - linux-protected
    - ubuntu-protected
    - ubuntu24-protected
  needs:
    - job: release:gitlab
      optional: true
  before_script:
    - test -n "$GITHUB_MIRROR_URL"
    - test -n "$GITHUB_MIRROR_SSH_KEY"
    - mkdir -p ~/.ssh
    - cp "$GITHUB_MIRROR_SSH_KEY" ~/.ssh/github_mirror
    - chmod 600 ~/.ssh/github_mirror
    - ssh-keyscan github.com >> ~/.ssh/known_hosts
    - git config core.sshCommand "ssh -i ~/.ssh/github_mirror -o IdentitiesOnly=yes"
  script:
    - git fetch --tags origin
    - git remote remove github-mirror 2>/dev/null || true
    - git remote add github-mirror "$GITHUB_MIRROR_URL"
    - git push github-mirror "HEAD:refs/heads/main"
